name: app
description: "Aoun App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.6.0
  http_parser: ^4.0.2

  # UI & charts
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8

  # Camera & media
  image_picker: ^1.0.4

  # Voice input — versions compatible with Flutter 3.41+
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.0

  # Storage & deep links
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - logo/image.png
